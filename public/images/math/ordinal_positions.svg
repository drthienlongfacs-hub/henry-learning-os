<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-label="Thứ tự và vị trí">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="0.55" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="960" height="600" fill="url(#bg)"/>
  <circle cx="116" cy="106" r="64" fill="#ec4899" opacity="0.12"/>
  <circle cx="833" cy="505" r="88" fill="#10b981" opacity="0.10"/>
  <rect x="78" y="70" width="804" height="460" rx="34" fill="#ffffff" opacity="0.88" filter="url(#shadow)"/>
  <text x="112" y="124" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">Thứ tự và vị trí</text>
  
    <g transform="translate(135 190)">
      <circle cx="70" cy="70" r="48" fill="#e0e7ff"/><text x="56" y="84" font-size="38" font-weight="900" fill="#475569">1</text><circle cx="205" cy="70" r="48" fill="#e0e7ff"/><text x="191" y="84" font-size="38" font-weight="900" fill="#475569">2</text><circle cx="340" cy="70" r="48" fill="#ec4899"/><text x="326" y="84" font-size="38" font-weight="900" fill="#fff">3</text><circle cx="475" cy="70" r="48" fill="#e0e7ff"/><text x="461" y="84" font-size="38" font-weight="900" fill="#475569">4</text><circle cx="610" cy="70" r="48" fill="#e0e7ff"/><text x="596" y="84" font-size="38" font-weight="900" fill="#475569">5</text>
      <text x="0" y="205" font-size="30" font-weight="700" fill="#475569">Đếm từ trái sang phải, nói rõ vị trí.</text>
