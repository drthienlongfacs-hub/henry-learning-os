<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-label="Phần trăm">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="0.55" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="960" height="600" fill="url(#bg)"/>
  <circle cx="116" cy="106" r="64" fill="#ef4444" opacity="0.12"/>
  <circle cx="833" cy="505" r="88" fill="#10b981" opacity="0.10"/>
  <rect x="78" y="70" width="804" height="460" rx="34" fill="#ffffff" opacity="0.88" filter="url(#shadow)"/>
  <text x="112" y="124" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">Phần trăm</text>
  <g transform="translate(260 165)"><text x="0" y="200" font-size="190" font-weight="900" fill="#ef4444">%</text><text x="220" y="86" font-size="48" font-weight="900" fill="#334155">25 / 100</text><text x="220" y="164" font-size="48" font-weight="900" fill="#334155">= 25%</text><text x="-90" y="320" font-size="30" font-weight="700" fill="#475569">Phần trăm là số phần trong 100 phần.</text></g>
</svg>